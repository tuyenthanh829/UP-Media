name: Build Chrome Manager

on:
  push:
    branches: [main]
    paths:
      - 'chrome-shortcut-manager/**'
  workflow_dispatch:  # Cho phép chạy tay từ tab Actions trên GitHub

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: chrome-shortcut-manager

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chrome-shortcut-manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$v" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload installer (.exe setup)
        uses: actions/upload-artifact@v4
        with:
          name: ChromeManager-${{ steps.version.outputs.version }}-Setup
          path: chrome-shortcut-manager/dist/*Setup*.exe
          retention-days: 30

      - name: Upload portable (.exe portable)
        uses: actions/upload-artifact@v4
        with:
          name: ChromeManager-${{ steps.version.outputs.version }}-Portable
          path: chrome-shortcut-manager/dist/*portable*.exe
          retention-days: 30
